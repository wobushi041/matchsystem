server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        domain: localhost

spring:
  application:
    name: matchsystem
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/matchsystem?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: your_mysql_username
    password: your_mysql_password
  profiles:
    active: dev
  redis:
    host: localhost
    port: 6379
    password: your_redis_password
    database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
  session:
    timeout: 86400
    store-type: redis

match:
  cache:
    warmup:
      bootstrap-enabled: true
      seed-user-ids: 1
      default-page-num: 1
      default-page-size: 20
      delay-millis: 10000
      logic-expire-millis: 100000
      refresh-ahead-millis: 60000
      redis-ttl-minutes: 720
      lock-lease-seconds: 30

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
