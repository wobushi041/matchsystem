server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        domain: localhost

spring:
  application:
    name: matchsystem
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yupao
    username: root
    password: 123456
  profiles:
    #dev test prod
    active: dev
  redis:
    port: 6379
    host: localhost
    password: 123456
    database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
  session:
    # session 失效时间
    timeout: 86400
    store-type: redis

match:
  cache:
    warmup:
      bootstrap-enabled: true
      seed-user-ids: 1
      default-page-num: 1
      default-page-size: 20
      # 兜底延时，动态延时不可用时使用
      delay-millis: 10000
      # 逻辑过期时间
      logic-expire-millis: 100000
      # 提前多久触发下一次刷新
      refresh-ahead-millis: 0
      #缓存TTL时间
      redis-ttl-minutes: 720
      lock-lease-seconds: 30



mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)


knife4j:
  enable: true


springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
