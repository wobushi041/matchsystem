# 线上配置文件

spring:
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: 'jdbc:mysql://sh-cynosdbmysql-grp-98pxrcoq.sql.tencentcdb.com:29164/user_center?useSSL=false'
    username: self
    password:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
  # session 失效时间
  session:
    timeout: 86400

match:
  cache:
    warmup:
      bootstrap-enabled: true
      seed-user-ids: 1
      default-page-num: 1
      default-page-size: 10
      delay-millis: 43200000
      logic-expire-millis: 43200000
      refresh-ahead-millis: 1800000
      redis-ttl-minutes: 1440
      lock-lease-seconds: 30

server:
  address: 0.0.0.0

